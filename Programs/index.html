<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakta Sansaar - Blood Donation Management</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 400px;
            width: 100%;
            margin-bottom: 15px;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #d9534f;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Blood Donor Registration - Rakta Sansaar</h2>

    <div class="form-container">
        <form id="donorForm">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" required>

            <label for="bloodGroup">Blood Group:</label>
            <select id="bloodGroup" name="bloodGroup" required>
                <option value="">Select Blood Group</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>

            <label for="phoneNumber">Phone Number:</label>
            <input type="text" id="phoneNumber" name="phoneNumber" required>

            <label for="location">Your Location:</label>
            <input type="text" id="location" name="location" readonly>
            <button type="button" onclick="useCurrentLocation()">Use Current Location</button>

            <div id="map"></div>

            <button type="submit">Register as Donor</button>
        </form>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map, marker;

        function initMap() {
            const defaultLocation = [27.628359, 83.470357]; 

            map = L.map('map').setView(defaultLocation, 15);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            marker = L.marker(defaultLocation).addTo(map)
                .bindPopup('Nepathya College, Manigram, Rupandehi')
                .openPopup();

            document.getElementById('location').value = "Nepathya College, Manigram, Rupandehi, Nepal";
        }

        function useCurrentLocation() {
            console.log("Trying to get current location...");

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLocation = [position.coords.latitude, position.coords.longitude];

                        console.log("User location:", userLocation); 

                        map.setView(userLocation, 15);

                        if (marker) {
                            map.removeLayer(marker);
                        }

                        marker = L.marker(userLocation).addTo(map)
                            .bindPopup("Your Current Location")
                            .openPopup();

                        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLocation[0]}&lon=${userLocation[1]}&zoom=18`)
                            .then(response => response.json())
                            .then(data => {
                                const locationName = data.display_name || "Unknown Location";
                                console.log("Reverse Geocode Data:", data); // Debugging
                                document.getElementById('location').value = locationName;

                                if (locationName.includes("Rupandehi") && !locationName.includes("Tansen")) {
                                    console.log("Detected incorrect location, trying to adjust...");
                                    document.getElementById('location').value = "Tansen, Rupandehi, Nepal"; // Adjust manually
                                }
                            })
                            .catch((err) => {
                                console.error("Error fetching address:", err); // Debugging
                                alert("Unable to retrieve address.");
                            });

                    },
                    (error) => {
                        console.error("Geolocation error:", error);
                        alert("Error: Unable to retrieve your location. Please allow location access in your browser.");
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        document.addEventListener("DOMContentLoaded", initMap);
    </script>

</body>
</html>
